name: TEMP Verify Pages Deploy

# Temporary: verifies the github-pages deploy works from main with the v5 Pages
# actions (upload-pages-artifact@v5 + deploy-pages@v5). Delete once green.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SBT_OPTS: "-Dsbt.ci=true -Dsbt.color=false -Dsbt.log.noformat=true"
  SKIP_NATIVE_GENERATION: true

jobs:
  publish-docs:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1

      - name: Generate Scaladoc + Javadoc
        run: sbt --batch "scala-polars/Compile/doc"

      - name: Stage API docs
        shell: bash
        run: |
          shopt -s nullglob
          dirs=(target/out/jvm/scala-*/scala-polars/api)
          if [ ${#dirs[@]} -ne 1 ]; then
            echo "Expected exactly one API docs dir, found ${#dirs[@]}: ${dirs[*]:-<none>}" >&2
            exit 1
          fi
          mkdir -p site/api/latest
          cp -R "${dirs[0]}/." site/api/latest/
          cat > site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta http-equiv="refresh" content="0; url=api/latest/" />
            <title>scala-polars documentation</title>
          </head>
          <body>
            <a href="api/latest/">Go to the scala-polars API documentation</a>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
