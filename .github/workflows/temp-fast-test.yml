name: TEMP Fast Test (reuse natives)

# Temporary workflow to iterate on the test-build legs WITHOUT rebuilding native libs.
# It downloads the native artifacts from a previously-successful run and runs only the
# test/assembly/smoke/coverage steps. Delete this file once the test steps are stable.

on:
  workflow_dispatch:
    inputs:
      native_run_id:
        description: "Run ID to pull native_libs-* artifacts from"
        required: true
        default: "28929362790"

permissions:
  contents: read
  actions: read

env:
  NATIVE_LIB_LOCATION: ${{ github.workspace }}/native-libs/
  SBT_OPTS: "-Dsbt.ci=true -Dsbt.global.localcache=/tmp/sbt-cache -Dsbt.color=false -Dsbt.log.noformat=true"
  JAVA_OPTS: "-XX:+UseG1GC -Xms512M -Xmx4G -Xss6M -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8"
  NATIVE_RELEASE: true

jobs:
  test-build:
    name: ${{ matrix.os }} test-jdk-${{ matrix.java }}
    runs-on: ${{ matrix.os }}
    env:
      SKIP_NATIVE_GENERATION: true
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "25"]
        os: ["ubuntu-22.04", "ubuntu-22.04-arm", "windows-2022", "windows-11-arm", "macos-15-intel", "macos-15"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDKs (test target + sbt runtime)
        uses: actions/setup-java@v5
        with:
          java-version: |
            ${{ matrix.java }}
            25
          distribution: "zulu"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1

      # Reuse native libs from a prior successful run instead of rebuilding.
      - name: Download prebuilt native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native_libs-*
          path: ${{env.NATIVE_LIB_LOCATION}}
          merge-multiple: true
          run-id: ${{ github.event.inputs.native_run_id }}
          github-token: ${{ github.token }}

      - name: Show staged native libs
        shell: bash
        run: ls -lhR "${NATIVE_LIB_LOCATION}" || true

      - name: Test and assemble for ${{ matrix.os }} (target JDK ${{ matrix.java }})
        shell: bash
        run: |
          set -o pipefail
          sbt --batch "+scala-polars/testFull ; +assembly" 2>&1 | tee sbt-build.log
          code=${PIPESTATUS[0]}
          if grep -qE '^\[error\]' sbt-build.log; then exit 1; fi
          if [ "$code" -ne 0 ] && ! grep -qE '^\[success\]' sbt-build.log; then exit "$code"; fi

      - name: End-to-end smoke test for ${{ matrix.os }} (target JDK ${{ matrix.java }})
        shell: bash
        run: |
          for v in 2.12.21 2.13.18 3.3.8; do
            dir="./target/out/jvm/scala-${v}/scala-polars-examples"
            for jar in "${dir}"/scala-polars-examples-assembly-*.jar; do
              echo "Running end-to-end smoke test on: $jar (Scala $v)"
              java -cp "$jar" examples.scala.io.LazyAndEagerAPI
            done
          done

      - name: Scala coverage report (scoverage)
        if: matrix.os == 'ubuntu-22.04' && matrix.java == '17'
        shell: bash
        run: |
          set -o pipefail
          sbt --batch "coverage ; scala-polars/testFull ; scala-polars/coverageReport" 2>&1 | tee sbt-scoverage.log
          code=${PIPESTATUS[0]}
          if grep -qE '^\[error\]' sbt-scoverage.log; then exit 1; fi
          if [ "$code" -ne 0 ] && ! grep -qE '^\[success\]' sbt-scoverage.log; then exit "$code"; fi

      - name: Java coverage report (JaCoCo)
        if: matrix.os == 'ubuntu-22.04' && matrix.java == '17'
        shell: bash
        run: |
          set -o pipefail
          sbt --batch -Djacoco.enable=true "reload ; scala-polars/jacoco" 2>&1 | tee sbt-jacoco.log
          code=${PIPESTATUS[0]}
          if grep -qE '^\[error\]' sbt-jacoco.log; then exit 1; fi
          if [ "$code" -ne 0 ] && ! grep -qE '^\[success\]' sbt-jacoco.log; then exit "$code"; fi
