name: Publish Artifacts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NATIVE_LIB_LOCATION: /tmp/native-libs/
  SBT_OPTS: "-Dsbt.ci=true"
  JAVA_OPTS: "-XX:+UseG1GC -Xms2G -Xmx8G -Xss6M -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8"
  NATIVE_RELEASE: true

jobs:
  check-formatting:
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      SKIP_NATIVE_GENERATION: true
    steps:
      - uses: actions/checkout@v6

      # sbt 2.x requires JDK 17+ to run; use the latest LTS (25) for all build/CI tooling.
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: "clippy, rustfmt"

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-sort

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          prefix-key: lint

      - name: Check all formatting
        run: just lint

      - name: Check doc issues
        run: just site

  build-natives:
    name: ${{ matrix.arch }} build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      TARGET_TRIPLE: ${{ matrix.arch }}
    needs: [check-formatting]
    strategy:
      fail-fast: true
      matrix:
        include:
          # Build Linux on 22.04 (glibc 2.35), not 24.04 — produces libs that load on older
          # glibc too. 24.04's glibc 2.39 would break consumers (and the 22.04 test leg).
          - os: ubuntu-22.04
            arch: x86_64-unknown-linux-gnu
            packages: ""

          - os: ubuntu-22.04-arm
            arch: aarch64-unknown-linux-gnu
            packages: ""

          - os: macos-15-intel
            arch: x86_64-apple-darwin
            packages: "brew install sbt"

          - os: macos-14
            arch: aarch64-apple-darwin
            packages: ""

          - os: windows-2022
            arch: x86_64-pc-windows-msvc
            packages: ""

          - os: windows-11-arm
            arch: aarch64-pc-windows-msvc
            packages: ""
    steps:
      - name: Install system packages
        run: ${{ matrix.packages }}

      - uses: actions/checkout@v6

      # sbt 2.x runs on JDK 17+; latest LTS (25) for the native build tooling.
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          prefix-key: ${{ matrix.arch }}

      - name: Cross publish artifacts containing native library
        run: |
          rustup target add ${{ matrix.arch }}
          sbt "generateNativeLibrary ; shutdown"

      - name: Temporarily save native library for ${{ matrix.arch }}
        uses: actions/upload-artifact@v7
        with:
          name: native_libs-${{ matrix.arch }}
          path: ${{env.NATIVE_LIB_LOCATION}}
          retention-days: 1
          if-no-files-found: error

  test-build:
    name: ${{ matrix.os }} test-jdk-${{ matrix.java }}
    runs-on: ${{ matrix.os }}
    needs: [build-natives]
    env:
      SKIP_NATIVE_GENERATION: true
    strategy:
      fail-fast: false
      matrix:
        # sbt runs on JDK 25; `matrix.java` is the JDK the forked test JVM targets, proving the
        # `-release 8` artifacts run on JDK 8 as well as the latest LTS.
        java: ["8", "25"]
        os: ["ubuntu-22.04", "windows-2022", "macos-14"]

    steps:
      - uses: actions/checkout@v6

      # Install the test-target JDK first, then JDK 25 last so it is the default that hosts sbt.
      # actions/setup-java exposes each install as JAVA_HOME_<major>_<arch>.
      - name: Set up JDKs (test target + sbt runtime)
        uses: actions/setup-java@v5
        with:
          java-version: |
            ${{ matrix.java }}
            25
          distribution: "zulu"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1

      # Point the forked test JVM at the matrix JDK. GeneralSettings reads JAVA_HOME_8 for the
      # JDK 8 leg; the JDK 25 leg runs tests on the sbt runtime JDK (no override needed).
      - name: Select forked-test JDK
        shell: bash
        run: |
          if [ "${{ matrix.java }}" = "8" ]; then
            for v in JAVA_HOME_8_X64 JAVA_HOME_8_ARM64 JAVA_HOME_8_AARCH64; do
              if [ -n "${!v:-}" ]; then echo "JAVA_HOME_8=${!v}" >> "$GITHUB_ENV"; break; fi
            done
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native_libs-*
          path: ${{env.NATIVE_LIB_LOCATION}}
          merge-multiple: true

      # sbt 2.x `test` is incremental/cached; use `testFull` to force the whole suite every run.
      # The assembled example jars self-extract the bundled native lib (end-to-end smoke test).
      - name: Test for ${{ matrix.os }} (target JDK ${{ matrix.java }})
        shell: bash
        run: |
          sbt "+scala-polars/testFull ; +assembly ; shutdown"
          for v in 2.12.21 2.13.18 3.3.8; do
            java -cp "./target/out/jvm/scala-${v}/scala-polars-examples/scala-polars-examples-assembly-0.1.0-SNAPSHOT.jar" examples.scala.io.LazyAndEagerAPI
          done

      # Coverage on one canonical leg (Ubuntu / test-JDK 8): scoverage (Scala) + JaCoCo (Java) → Codecov.
      - name: Scala coverage report (scoverage)
        if: matrix.os == 'ubuntu-22.04' && matrix.java == '8'
        run: sbt "coverage ; scala-polars/testFull ; scala-polars/coverageReport ; shutdown"

      - name: Java coverage report (JaCoCo)
        if: matrix.os == 'ubuntu-22.04' && matrix.java == '8'
        run: sbt "-Djacoco.enable=true" "scala-polars/jacoco ; shutdown"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-22.04' && matrix.java == '8'
        uses: codecov/codecov-action@v5
        with:
          files: >-
            target/out/jvm/scala-*/scala-polars/coverage-report/cobertura.xml,
            target/out/jvm/scala-*/scala-polars/jacoco/report/jacoco.xml
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports (artifact)
        if: matrix.os == 'ubuntu-22.04' && matrix.java == '8'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            target/out/jvm/scala-*/scala-polars/scoverage-report/
            target/out/jvm/scala-*/scala-polars/coverage-report/cobertura.xml
            target/out/jvm/scala-*/scala-polars/jacoco/report/
          if-no-files-found: warn

  publish:
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      SKIP_NATIVE_GENERATION: true
    needs: [test-build]
    steps:
      - uses: actions/checkout@v6

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # sbt 2.x runs on JDK 17+; latest LTS (25) for publishing.
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native_libs-*
          path: ${{env.NATIVE_LIB_LOCATION}}
          merge-multiple: true

      - name: List the built artifacts
        run: ls -lhtR
        working-directory: ${{env.NATIVE_LIB_LOCATION}}

      # ci-release 1.11.x publishes to the Sonatype Central Portal by default.
      - name: Publish Artifacts
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: sbt "ci-release ; shutdown"
