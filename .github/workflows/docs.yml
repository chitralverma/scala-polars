name: Publish API Docs

concurrency:
  group: pages
  cancel-in-progress: false

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    env:
      SKIP_NATIVE_GENERATION: true
    steps:
      - uses: actions/checkout@v6

      # sbt 2.x runs on JDK 17+; latest LTS (25) for doc generation.
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1

      - name: Generate Scaladoc + Javadoc
        run: sbt "scala-polars/Compile/doc ; shutdown"

      # The API docs land under target/out/jvm/scala-<default>/scala-polars/api (default Scala 2.13).
      - name: Stage API docs
        run: |
          src="$(find target/out/jvm/scala-2.13*/scala-polars/api -maxdepth 0 -type d | head -1)"
          if [ -z "${src}" ]; then echo "No API docs found under target/out" >&2; exit 1; fi
          mkdir -p site/api/latest
          cp -R "${src}/." site/api/latest/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
